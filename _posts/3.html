<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>排除已解密文字的乱码效果</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a16;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            padding: 2rem;
            overflow: hidden;
        }

        /* 辉光样式 */
        :root {
            --glow-color: #00ff00;
            --hover-glow: #00ffff;
            --base-shadow: 
                0 0 3px var(--glow-color),
                0 0 6px var(--glow-color),
                0 0 12px var(--glow-color),
                0 0 24px var(--glow-color);
            --hover-shadow: 
                0 0 4px var(--hover-glow),
                0 0 8px var(--hover-glow),
                0 0 16px var(--hover-glow),
                0 0 32px var(--hover-glow);
        }

        [data-scramble] {
            font: 2.5rem/1.4 monospace;
            color: var(--glow-color);
            cursor: pointer;
            margin: 15px 0;
            transition: all 0.3s ease;
            text-shadow: var(--base-shadow);
        }

        [data-scramble]:hover {
            color: var(--hover-glow);
            text-shadow: var(--hover-shadow);
        }

        .char {
            display: inline-block;
            min-width: 1.2rem;
            text-align: center;
        }

        .char.recovered {
            color: var(--glow-color);
        }

        [data-scramble]:hover .char.recovered {
            color: var(--hover-glow);
        }

        /* 控制按钮样式 */
        .control-panel {
            margin: 2rem 0;
            display: flex;
            gap: 1rem;
        }

        button {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .description {
            color: rgba(255, 255, 255, 0.7);
            max-width: 600px;
            line-height: 1.6;
            text-align: center;
        }
    </style>
</head>
<body>
    <p>每解密一个字，剩余乱码会排除已解密字符</p>
    <div data-scramble="解密过程更加智能"></div>
    <div data-scramble="已出现的字不会再作为乱码"></div>
    <div data-scramble="难度随解密进度逐渐降低"></div>
    <div data-scramble="体验更接近真实解密过程"></div>

    <div class="control-panel">
        <button id="startBtn"><i class="fa fa-play"></i> 开始动画</button>
        <button id="stopBtn"><i class="fa fa-pause"></i> 停止动画</button>
        <button id="resetBtn"><i class="fa fa-refresh"></i> 重置</button>
    </div>

    <div class="description">
        <p>特性：每解密一个文字，剩余未解密文字的乱码池中会自动排除已解密的字符，随着解密推进，乱码范围逐渐缩小，更符合真实解密逻辑。</p>
    </div>

    <script>
        // 配置参数
        const FRAME_INTERVAL = 33; // 30帧/秒
        const RECOVER_DELAY = 150; // 字符恢复间隔

        // 全局状态管理
        let isGlobalAnimationRunning = true;
        const scrambleElements = document.querySelectorAll('[data-scramble]');
        const animationStates = new Map();

        // 初始化单个解密元素
        function initScrambleElement(el) {
            const originalText = el.dataset.scramble;
            el.innerHTML = '';

            // 为当前行创建专属字符集（使用本行文字去重）
            const uniqueChars = [...new Set(originalText.split(''))];
            el.dataset.fullCharset = uniqueChars.join(''); // 存储完整字符集
            
            // 为每个字符创建span元素
            for (let i = 0; i < originalText.length; i++) {
                const charSpan = document.createElement('span');
                charSpan.classList.add('char');
                charSpan.dataset.original = originalText[i];
                charSpan.dataset.recovered = "false";
                el.appendChild(charSpan);
            }

            // 存储元素状态，包含已解密字符集合
            animationStates.set(el, {
                progress: 0,
                isDecrypting: false,
                frameId: null,
                timer: null,
                wasRunning: false,
                decryptedChars: new Set() // 用于存储已解密的字符
            });

            // 初始化乱码
            updateScramble(el);
        }

        // 获取当前可用的乱码字符集（排除已解密的字符）
        function getAvailableChars(el) {
            const state = animationStates.get(el);
            const fullCharset = el.dataset.fullCharset;
            
            // 过滤掉已解密的字符
            return fullCharset.split('').filter(char => 
                !state.decryptedChars.has(char)
            );
        }

        // 生成随机乱码字符 - 排除已解密的字符
        function getRandomScrambleChar(el) {
            const availableChars = getAvailableChars(el);
            // 如果所有字符都已解密（理论上不会发生），返回空
            if (availableChars.length === 0) return '';
            
            const randomIndex = Math.floor(Math.random() * availableChars.length);
            return availableChars[randomIndex];
        }

        // 更新乱码动画 - 仅使用可用字符集
        function updateScramble(el) {
            const state = animationStates.get(el);
            if (!isGlobalAnimationRunning && !state.isDecrypting) return;

            const charElements = el.querySelectorAll('.char');
            const availableChars = getAvailableChars(el);
            
            // 只更新未恢复的字符，使用过滤后的字符集
            charElements.forEach(char => {
                if (char.dataset.recovered === "false" && availableChars.length > 0) {
                    char.textContent = getRandomScrambleChar(el);
                }
            });

            // 继续下一帧动画
            state.frameId = setTimeout(() => updateScramble(el), FRAME_INTERVAL);
        }

        // 开始解密过程 - 记录已解密字符
        function startDecrypt(el) {
            const state = animationStates.get(el);
            if (state.isDecrypting || state.progress >= el.dataset.scramble.length) return;

            state.wasRunning = isGlobalAnimationRunning;
            state.isDecrypting = true;
            const charElements = el.querySelectorAll('.char');
            const totalChars = charElements.length;

            // 解密步骤 - 添加已解密字符到集合中
            const decryptStep = () => {
                if (state.progress >= totalChars) {
                    state.isDecrypting = false;
                    clearTimeout(state.timer);
                    return;
                }

                // 标记当前字符为已恢复
                const currentChar = charElements[state.progress];
                const originalChar = currentChar.dataset.original;
                
                // 将解密的字符添加到已解密集合
                state.decryptedChars.add(originalChar);
                
                currentChar.dataset.recovered = "true";
                currentChar.textContent = originalChar;
                currentChar.classList.add('recovered');
                
                state.progress++;
                state.timer = setTimeout(decryptStep, RECOVER_DELAY);
            };

            decryptStep();
            if (state.frameId) clearTimeout(state.frameId);
            updateScramble(el);
        }

        // 暂停解密过程
        function pauseDecrypt(el) {
            const state = animationStates.get(el);
            if (!state.isDecrypting) return;

            state.isDecrypting = false;
            clearTimeout(state.timer);
            
            // 恢复到全局状态
            if (!state.wasRunning) {
                if (state.frameId) {
                    clearTimeout(state.frameId);
                    state.frameId = null;
                }
            }
        }

        // 启动/停止元素动画
        function startScrambleAnimation(el) {
            const state = animationStates.get(el);
            if (state.frameId) clearTimeout(state.frameId);
            updateScramble(el);
        }

        function stopScrambleAnimation(el) {
            const state = animationStates.get(el);
            if (state.frameId) {
                clearTimeout(state.frameId);
                state.frameId = null;
            }
            if (!state.isDecrypting) {
                pauseDecrypt(el);
            }
        }

        // 初始化所有元素
        function initAllElements() {
            scrambleElements.forEach(el => {
                initScrambleElement(el);
                startScrambleAnimation(el);
                
                // 绑定鼠标事件
                el.addEventListener('mouseenter', () => startDecrypt(el));
                el.addEventListener('mouseleave', () => pauseDecrypt(el));
            });
        }

        // 控制按钮事件
        document.getElementById('startBtn').addEventListener('click', () => {
            if (isGlobalAnimationRunning) return;
            isGlobalAnimationRunning = true;
            scrambleElements.forEach(el => startScrambleAnimation(el));
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            if (!isGlobalAnimationRunning) return;
            isGlobalAnimationRunning = false;
            scrambleElements.forEach(el => {
                const state = animationStates.get(el);
                if (!state.isDecrypting) {
                    stopScrambleAnimation(el);
                }
            });
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            scrambleElements.forEach(el => {
                const state = animationStates.get(el);
                if (state.frameId) clearTimeout(state.frameId);
                if (state.timer) clearTimeout(state.timer);
            });
            isGlobalAnimationRunning = true;
            initAllElements();
        });

        // 页面加载时初始化
        initAllElements();
    </script>
</body>
</html>
