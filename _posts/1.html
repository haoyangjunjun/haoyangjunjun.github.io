<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>收敛的辉光解密文字</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a16;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            padding: 2rem;
            overflow: hidden;
        }

        /* 重新设计辉光效果，减小蓝光范围 */
        :root {
            --glow-color: #00ff00;
            --hover-glow: #00ffff;
            
            /* 绿色基础辉光 */
            --base-shadow: 
                0 0 3px var(--glow-color),
                0 0 6px var(--glow-color),
                0 0 12px var(--glow-color),
                0 0 24px var(--glow-color);
                
            /* 蓝色悬停辉光（范围减小，更集中） */
            --hover-shadow: 
                0 0 4px var(--hover-glow),
                0 0 8px var(--hover-glow),
                0 0 16px var(--hover-glow),
                0 0 32px var(--hover-glow);
        }

        [data-scramble] {
            font: 2.5rem/1.4 monospace;
            color: var(--glow-color);
            cursor: pointer;
            margin: 15px 0;
            transition: all 0.3s ease;
            text-shadow: var(--base-shadow);
            animation: pulse 3s infinite ease-in-out;
        }

        /* 悬停状态完全替换为蓝色辉光 */
        [data-scramble]:hover {
            color: var(--hover-glow);
            text-shadow: var(--hover-shadow);
            animation: hoverPulse 2s infinite ease-in-out;
        }

        /* 绿色呼吸动画 */
        @keyframes pulse {
            50% {
                text-shadow:
                    0 0 5px var(--glow-color),
                    0 0 10px var(--glow-color),
                    0 0 20px var(--glow-color),
                    0 0 40px var(--glow-color);
            }
        }

        /* 蓝色悬停呼吸动画（范围更小） */
        @keyframes hoverPulse {
            50% {
                text-shadow:
                    0 0 6px var(--hover-glow),
                    0 0 12px var(--hover-glow),
                    0 0 24px var(--hover-glow),
                    0 0 48px var(--hover-glow);
            }
        }

        .description {
            color: rgba(255, 255, 255, 0.7);
            max-width: 600px;
            line-height: 1.6;
            text-align: center;
            margin-top: 2rem;
        }
    </style>
</head>

<body>
    <p>Hover to start/continue unscrambling, move away to pause...</p>
    <div data-scramble="这是全新的辉光效果"></div>
    <div data-scramble="蓝光范围已减小"></div>
    <div data-scramble="辉光过渡更自然"></div>
    <div data-scramble="悬停时有专属动画"></div>

    <div class="description">
        <p>改进点：减小了蓝色辉光范围，使其更集中；为悬停状态设计了专属呼吸动画；优化了颜色过渡效果。</p>
    </div>

    <script>
        // 生成随机字符串
        const randomString = (length) => {
            let result = '';
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const charsLength = chars.length;
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * charsLength));
            }
            return result;
        };

        // 解密核心逻辑
        const setupScramble = (el) => {
            const original = el.dataset.scramble;
            const total = original.length;
            let progress = 0;
            let timer = null;

            el.textContent = randomString(total);

            const update = () => {
                if (progress >= total) {
                    clearInterval(timer);
                    el.textContent = original;
                    return;
                }
                const solved = original.slice(0, progress);
                const scrambled = randomString(total - progress);
                el.textContent = solved + scrambled;
                progress++;
            };

            el.addEventListener('mouseenter', () => {
                if (!timer) {
                    timer = setInterval(update, 40);
                }
            });

            el.addEventListener('mouseleave', () => {
                clearInterval(timer);
                timer = null;
            });
        };

        document.querySelectorAll('[data-scramble]').forEach(setupScramble);
    </script>
</body>

</html>
