
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>单个字符独立解密</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a16;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            padding: 2rem;
            overflow: hidden;
        }

        /* 辉光样式 */
        :root {
            --glow-color: #00ff00;
            --hover-glow: #00ffff;
            
            /* 绿色基础辉光 */
            --base-shadow: 
                0 0 3px var(--glow-color),
                0 0 6px var(--glow-color),
                0 0 12px var(--glow-color);
                
            /* 蓝色悬停辉光 - 减小幅度 */
            --hover-shadow: 
                0 0 3px var(--hover-glow),
                0 0 6px var(--hover-glow),
                0 0 12px var(--hover-glow);
        }

        .scramble-container {
            font: 2.5rem/1.4 monospace;
            margin: 15px 0;
            display: flex;
            gap: 4px; /* 字符间间距 */
        }

        .scramble-char {
            color: var(--glow-color);
            text-shadow: var(--base-shadow);
            transition: all 0.2s ease;
            cursor: pointer;
            min-width: 1.2rem;
            text-align: center;
            animation: pulse 3s infinite ease-in-out;
        }

        /* 单个字符悬停效果 - 减小缩放幅度 */
        .scramble-char:hover {
            color: var(--hover-glow);
            text-shadow: var(--hover-shadow);
            animation: hoverPulse 1.5s infinite ease-in-out;
            transform: scale(1.05); /* 从1.1减小到1.05 */
        }

        /* 已解密的字符保持蓝色 */
        .scramble-char.decrypted {
            color: var(--hover-glow);
            text-shadow: var(--hover-shadow);
            animation: none;
        }

        /* 绿色呼吸动画 - 减小幅度 */
        @keyframes pulse {
            50% {
                text-shadow:
                    0 0 4px var(--glow-color),
                    0 0 8px var(--glow-color),
                    0 0 16px var(--glow-color);
            }
        }

        /* 蓝色悬停呼吸动画 - 减小幅度 */
        @keyframes hoverPulse {
            50% {
                text-shadow:
                    0 0 4px var(--hover-glow),
                    0 0 8px var(--hover-glow),
                    0 0 16px var(--hover-glow);
            }
        }

        .controls {
            margin: 2rem 0;
            display: flex;
            gap: 1rem; /* 按钮间距 */
        }

        button {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glow-color);
            color: var(--glow-color);
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-shadow: var(--base-shadow);
        }

        button:hover {
            background-color: rgba(0, 255, 0, 0.1);
            color: var(--hover-glow);
            border-color: var(--hover-glow);
            text-shadow: var(--hover-shadow);
        }

        button.active {
            background-color: rgba(0, 255, 255, 0.2);
            border-color: var(--hover-glow);
            color: var(--hover-glow);
        }

        .description {
            color: rgba(255, 255, 255, 0.7);
            max-width: 600px;
            line-height: 1.6;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <p>Hover over individual characters to decrypt them</p>
    <div data-scramble="这是全新的辉光效果"></div>
    <div data-scramble="每个字符独立解密"></div>
    <div data-scramble="悬停单个字变蓝解密"></div>
    <div data-scramble="其他字保持绿色未解密"></div>

    <div class="controls">
        <button id="autoDecryptBtn">
            <i class="fa fa-play"></i> 自动解密
        </button>
        <button id="resetBtn">
            <i class="fa fa-refresh"></i> 重置解密
        </button>
    </div>

    <div class="description">
        <p>特性：新增自动解密功能，点击后将以每秒10个的速度随机解密字符；可手动悬停解密单个字符；点击重置按钮恢复初始状态。</p>
    </div>

    <script>
        // 配置参数
        const FRAME_RATE = 30;
        const FRAME_INTERVAL = 1000 / FRAME_RATE; // 约33.333ms每帧
        const AUTO_DECRYPT_SPEED = 100; // 自动解密间隔（毫秒），100ms = 每秒10个
        
        // 存储所有字符元素和状态
        const charStates = new Map();
        const allChars = [];
        let autoDecryptInterval = null; // 自动解密定时器
        
        // 生成随机字符
        const randomChar = () => {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            return chars.charAt(Math.floor(Math.random() * chars.length));
        };

        // 初始化单个解密容器
        const setupScrambleContainer = (container) => {
            const originalText = container.dataset.scramble;
            container.classList.add('scramble-container');
            container.innerHTML = ''; // 清空容器
            
            // 为每个字符创建独立元素
            for (let i = 0; i < originalText.length; i++) {
                const charEl = document.createElement('span');
                charEl.classList.add('scramble-char');
                charEl.dataset.original = originalText[i];
                charEl.dataset.index = i;
                charEl.dataset.decrypted = "false";
                
                // 初始显示随机字符
                charEl.textContent = randomChar();
                
                container.appendChild(charEl);
                
                // 存储字符状态
                const charState = {
                    element: charEl,
                    original: originalText[i],
                    isDecrypted: false,
                    frameId: null,
                    lastFrameTime: 0,
                    isHovering: false
                };
                
                charStates.set(charEl, charState);
                allChars.push(charEl);
                
                // 设置单个字符的动画和事件
                setupCharAnimation(charEl);
            }
        };

        // 设置单个字符的动画
        const setupCharAnimation = (charEl) => {
            const state = charStates.get(charEl);
            
            // 乱码动画函数
            const updateScramble = (timestamp) => {
                // 如果已解密或正在悬停，停止乱码动画
                if (state.isDecrypted || state.isHovering) {
                    return;
                }
                
                // 控制帧率
                if (!state.lastFrameTime) state.lastFrameTime = timestamp;
                const elapsed = timestamp - state.lastFrameTime;
                
                if (elapsed >= FRAME_INTERVAL) {
                    charEl.textContent = randomChar();
                    state.lastFrameTime = timestamp - (elapsed % FRAME_INTERVAL);
                }
                
                state.frameId = requestAnimationFrame(updateScramble);
            };
            
            // 开始乱码动画
            const startScramble = () => {
                if (!state.frameId && !state.isDecrypted) {
                    state.lastFrameTime = 0;
                    state.frameId = requestAnimationFrame(updateScramble);
                }
            };
            
            // 停止乱码动画
            const stopScramble = () => {
                if (state.frameId) {
                    cancelAnimationFrame(state.frameId);
                    state.frameId = null;
                }
            };
            
            // 解密字符
            const decryptChar = () => {
                if (!state.isDecrypted) {
                    stopScramble();
                    state.isDecrypted = true;
                    charEl.dataset.decrypted = "true";
                    charEl.textContent = state.original;
                    charEl.classList.add('decrypted');
                }
            };
            
            // 鼠标进入事件 - 停止乱码，准备解密
            charEl.addEventListener('mouseenter', () => {
                state.isHovering = true;
                stopScramble();
                // 悬停时立即解密
                decryptChar();
            });
            
            // 鼠标离开事件 - 恢复乱码（如果未解密）
            charEl.addEventListener('mouseleave', () => {
                state.isHovering = false;
                if (!state.isDecrypted) {
                    startScramble();
                }
            });
            
            // 初始启动乱码动画
            startScramble();
        };

        // 随机解密一个未解密的字符
        const decryptRandomChar = () => {
            // 筛选出所有未解密的字符
            const undecryptedChars = allChars.filter(charEl => 
                !charStates.get(charEl).isDecrypted
            );
            
            // 如果所有字符都已解密，停止自动解密
            if (undecryptedChars.length === 0) {
                stopAutoDecrypt();
                return;
            }
            
            // 随机选择一个字符进行解密
            const randomIndex = Math.floor(Math.random() * undecryptedChars.length);
            const charToDecrypt = undecryptedChars[randomIndex];
            const state = charStates.get(charToDecrypt);
            
            // 解密选中的字符
            if (!state.isDecrypted) {
                state.isHovering = true; // 模拟悬停状态
                if (state.frameId) {
                    cancelAnimationFrame(state.frameId);
                    state.frameId = null;
                }
                state.isDecrypted = true;
                charToDecrypt.dataset.decrypted = "true";
                charToDecrypt.textContent = state.original;
                charToDecrypt.classList.add('decrypted');
            }
        };

        // 开始自动解密
        const startAutoDecrypt = () => {
            if (!autoDecryptInterval) {
                // 立即解密第一个字符
                decryptRandomChar();
                // 设置定时器，按指定速度解密后续字符
                autoDecryptInterval = setInterval(decryptRandomChar, AUTO_DECRYPT_SPEED);
                // 更新按钮状态
                document.getElementById('autoDecryptBtn').classList.add('active');
                document.getElementById('autoDecryptBtn').innerHTML = '<i class="fa fa-stop"></i> 停止解密';
            }
        };

        // 停止自动解密
        const stopAutoDecrypt = () => {
            if (autoDecryptInterval) {
                clearInterval(autoDecryptInterval);
                autoDecryptInterval = null;
                // 更新按钮状态
                document.getElementById('autoDecryptBtn').classList.remove('active');
                document.getElementById('autoDecryptBtn').innerHTML = '<i class="fa fa-play"></i> 自动解密';
            }
        };

        // 重置所有字符
        const resetAllChars = () => {
            // 先停止自动解密
            stopAutoDecrypt();
            
            allChars.forEach(charEl => {
                const state = charStates.get(charEl);
                
                // 停止当前动画
                if (state.frameId) {
                    cancelAnimationFrame(state.frameId);
                    state.frameId = null;
                }
                
                // 完全重置状态
                state.isDecrypted = false;
                state.isHovering = false;
                charEl.dataset.decrypted = "false";
                charEl.classList.remove('decrypted');
                
                // 恢复随机字符
                charEl.textContent = randomChar();
                
                // 直接启动乱码动画
                state.lastFrameTime = 0;
                state.frameId = requestAnimationFrame(updateScramble);
                
                // 内部定义updateScramble，确保能正确引用
                function updateScramble(timestamp) {
                    if (state.isDecrypted || state.isHovering) {
                        return;
                    }
                    
                    if (!state.lastFrameTime) state.lastFrameTime = timestamp;
                    const elapsed = timestamp - state.lastFrameTime;
                    
                    if (elapsed >= FRAME_INTERVAL) {
                        charEl.textContent = randomChar();
                        state.lastFrameTime = timestamp - (elapsed % FRAME_INTERVAL);
                    }
                    
                    state.frameId = requestAnimationFrame(updateScramble);
                }
            });
        };

        // 初始化所有解密容器
        document.querySelectorAll('[data-scramble]').forEach(setupScrambleContainer);

        // 绑定按钮事件
        document.getElementById('autoDecryptBtn').addEventListener('click', () => {
            if (autoDecryptInterval) {
                stopAutoDecrypt();
            } else {
                startAutoDecrypt();
            }
        });

        document.getElementById('resetBtn').addEventListener('click', resetAllChars);
    </script>
</body>

</html>
