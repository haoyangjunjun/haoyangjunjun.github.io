<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>末世生存终端 - 文字冒险</title>
    
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 终端颜色定义 */
        :root {
            --terminal-green: #00ff00;
            --terminal-dark: #0a0a0a;
            --terminal-glow: #33ff33;
            --terminal-border: #00ff00;
        }
        
        /* 全局样式 */
        body {
            background-color: var(--terminal-dark);
            color: var(--terminal-green);
            font-family: 'Courier New', monospace;
            overflow: hidden;
            background-color: black;
            background: radial-gradient(
                #000000 0%,   
                #071707 65%,  
                #041804 75%,   
                #021b02 90%,  
                #014d0ae3 100%  
            );
            background-size: 100% 4px;
            background-repeat: repeat-y; 
        }
        
        /* 背景CRT扫描线效果 */
        .scanline-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(0, 255, 0, 0.108) 50%,
                transparent 100%
            );
            pointer-events: none;
            z-index: 50;
        }
        
        /* 主终端容器 */
        .terminal-container {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 终端头部 */
        .terminal-header {
            border-bottom: 1px solid var(--terminal-border);
            padding: 16px;
            justify-content: center;
            align-items: center;
        }
        
        /* 头部标题 */
        .terminal-title {
            text-shadow: 0 0 5px var(--terminal-green), 0 0 10px var(--terminal-green);
            font-size: 16px;
        }
        
        /* 终端内容区域 */
        .terminal-content {
            flex: 1;
            display: flex;
            height: calc(100vh - 112px); /* 减去头部和状态栏高度 */
        }
        
        /* 命令行区域 */
        .command-line {
            width: 50%;
            border-left: 1px solid var(--terminal-border);
            padding: 16px;
            overflow-y: auto;
        }
        
        /* 欢迎信息 */
        .welcome-message {
            margin-bottom: 16px;
        }
        
        .welcome-title {
            color: var(--terminal-glow);
            text-shadow: 0 0 5px var(--terminal-green), 0 0 10px var(--terminal-green);
            margin-bottom: 8px;
        }
        
        .welcome-info {
            font-size: 14px;
            opacity: 0.75;
        }
        
        /* 输入行 */
        .input-line {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .prompt {
            color: var(--terminal-glow);
            text-shadow: 0 0 5px var(--terminal-green), 0 0 10px var(--terminal-green);
        }
        
        .terminal-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--terminal-green);
            font-family: 'Courier New', monospace;
            font-size: 16px;
            width: calc(100% - 24px);
            caret-color: transparent; /* 隐藏原生光标 */
        }
        
        /* 自定义光标 */
        .custom-cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: var(--terminal-green);
            animation: blink 1s step-end infinite;
        }
        
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        
        /* 内容区域 */
        .content-area {
            width: 50%;
            padding: 16px;
            overflow-y: auto;
        }
        
        .content-header {
            text-align: center;
            margin-bottom: 16px;
        }
        
        /* 生成的内容区域 */
        .generated-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
            line-height: 1.5;
        }
        
        /* 剧情段落样式 */
        .story-paragraph {
            margin-bottom: 12px;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* 选项样式 */
        .options {
            margin-top: 16px;
            padding-left: 24px;
        }
        
        .option {
            margin: 8px 0;
            color: var(--terminal-glow);
        }
        
        /* 状态栏 */
        .status-bar {
            border-top: 1px solid var(--terminal-border);
            padding: 8px;
            font-size: 12px;
            opacity: 0.75;
            display: flex;
            justify-content: space-between;
        }
        
        /* 状态显示 */
        .status-indicators {
            display: flex;
            gap: 16px;
        }
        
        /* 文本发光效果 */
        .text-shadow-glow {
            text-shadow: 0 0 5px var(--terminal-green), 0 0 10px var(--terminal-green);
        }
        
        /* CRT背景线效果 */
        .bg-crt {
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 255, 0, 0.03) 50%
            );
            background-size: 100% 4px;
        }
        
        /* 命令历史记录 */
        .command-history {
            margin-bottom: 16px;
        }
        
        .history-entry {
            margin: 4px 0;
        }
    </style>
</head>
<body >
    <!-- CRT扫描线效果 -->
    <div class="scanline-effect"></div>
    
    <!-- 主终端容器 -->
    <div class="terminal-container">
        <!-- 终端头部 -->
        <div class="terminal-header">
            <div class="terminal-title">命令终端 v0.1</div>
        </div>
        
        <!-- 终端内容区域 -->
        <div class="terminal-content">
            <!-- 内容区域 -->
            <div class="content-area">
                <div class="content-header">
                </div>
                <div class="generated-content"></div>
            </div>
            
            <!-- 命令行区域 -->
            <div class="command-line">
                <div class="welcome-message">
                    <div class="welcome-title">末日余烬 - 生存模拟器</div>
                    <div class="welcome-info">输入 'help' 查看游戏指令</div>
                    <div class="welcome-info">输入数字选择剧情分支</div>
                </div>
                
                <div class="command-history"></div>
                
                <div class="input-line">
                    <span class="prompt">$</span>
                    <input 
                        type="text" 
                        class="terminal-input"
                        placeholder="输入指令或选择..."
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                    >
                    <span class="custom-cursor"></span>
                </div>
            </div>
        </div>
        
        <div class="status-bar">
            <div class="status-indicators">
                <div>状态: 探索中</div>
                <div>体力: 75%</div>
                <div>物资: 有限</div>
            </div>
            <div>命令终端 - 无法求助</div>
        </div>
    </div>

    <script>
        // 游戏状态管理
        const gameState = {
            currentScene: 'start',
            health: 75,
            supplies: 'limited',
            inventory: ['小刀', '半瓶水'],
            daysSurvived: 5
        };
        
        // 剧情数据 - 末世生存主题
        const storyData = {
            start: {
                text: [
                    "您好 User-1145514 ",
                    "我是 635C351C366D66653B85D7F997063C52",
                    "您目前可能处于很困惑的状态,我将简短解释目前的情况",
                    "现在是█████████的█████在███████",
                    "您目前可能失去了视觉、嗅觉、味觉、触觉等，这种情况可能更接近[缸中之脑]的状态",
                    "您现在只能通过我的描述来获取外界信息"
                ],
                options: [
                    "1. 我是谁？？？好像记不清自己的名字了？？？",
                    "2. 也就是说我现在是个机器人？",
                    "3. ..."
                ],
                nextScenes: {
                    '1': 'whatismyname',
                    '2': 'investigateSound',
                    '3': 'restHere'
                }
            },
            whatismyname: {
                text: [
                    "您的 uesrname 是 User-1145514",
                    "警告：network 组件异常 无法连接任何服务",
                    "对不起，我无法更多信息了",
                    "警告：自检失败"
                ],
                options: [
                    "1. 你没事吧？",
                    "2. 也就是说我现在是个机器人？",
                    "3. 悄悄退出便利店，不惹麻烦"
                ],
                nextScenes: {
                    '1': 'storeFriendly',
                    '2': 'storeConfront',
                    '3': 'storeExit'
                }
            },
            investigateSound: {
                text: [
                    "由于无法联网，本地算力不足",
                    "请您对关键决定进行决策",
                    "转过一个街角，你看到一只体型庞大的变异狗正撕咬着什么。",
                    "它的皮毛脱落，眼睛发红，嘴角流着涎水。听到你的脚步声，它猛地转过头来！"
                ],
                options: [
                    "1. 转身就跑，尽可能快地远离这里",
                    "2. 握紧小刀，准备战斗",
                    "3. 慢慢后退，试图不惊动它地离开"
                ],
                nextScenes: {
                    '1': 'runFromDog',
                    '2': 'fightDog',
                    '3': 'sneakAway'
                }
            },
            restHere: {
                text: [
                    "你决定先休息片刻，靠在一堵相对完整的墙边坐下。",
                    "阳光透过废墟的缝隙照进来，形成一道道光柱。",
                    "闭上眼睛，你试图回忆起大崩塌前的生活，但记忆变得模糊。",
                    "休息了大约半小时，你感觉体力恢复了一些。",
                    "这时，你注意到不远处的一栋建筑上有一面反光，似乎是某种镜子或玻璃。"
                ],
                options: [
                    "1. 前往那栋建筑查看反光来源",
                    "2. 继续休息，保存更多体力",
                    "3. 向相反方向出发，避开可能的危险"
                ],
                nextScenes: {
                    '1': 'checkBuilding',
                    '2': 'restMore',
                    '3': 'goOpposite'
                }
            },
            // 简单的死亡结局
            death: {
                text: [
                    "你的冒险在这里结束了。",
                    "在这个残酷的末世，生存从来都不是一件容易的事。",
                    "也许下一次，你会做出不同的选择..."
                ],
                options: [
                    "1. 重新开始"
                ],
                nextScenes: {
                    '1': 'start'
                }
            }
        };
        
        // DOM元素
        const inputElement = document.querySelector('.terminal-input');
        const cursorElement = document.querySelector('.custom-cursor');
        const contentArea = document.querySelector('.generated-content');
        const commandHistory = document.querySelector('.command-history');
        const healthIndicator = document.querySelector('.status-indicators div:nth-child(2)');
        
        // 初始化游戏
        function initGame() {
            showScene('start');
            setupEventListeners();
            updateStatusIndicators();
        }
        
        // 显示指定场景
        function showScene(sceneId) {
            const scene = storyData[sceneId];
            if (!scene) return;
            
            // 更新游戏状态
            gameState.currentScene = sceneId;
            
            // 清空内容区域
            contentArea.innerHTML = '';
            
            // 逐行显示剧情文本，带打字效果
            scene.text.forEach((paragraph, index) => {
                setTimeout(() => {
                    const pElement = document.createElement('p');
                    pElement.className = 'story-paragraph';
                    pElement.textContent = paragraph;
                    contentArea.appendChild(pElement);
                    contentArea.scrollTop = contentArea.scrollHeight;
                }, index * 800); // 每行间隔显示
            });
            
            // 显示选项
            setTimeout(() => {
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';
                
                scene.options.forEach(option => {
                    const optionElement = document.createElement('div');
                    optionElement.className = 'option';
                    optionElement.textContent = option;
                    optionsDiv.appendChild(optionElement);
                });
                
                contentArea.appendChild(optionsDiv);
                contentArea.scrollTop = contentArea.scrollHeight;
            }, scene.text.length * 800 + 500);
        }
        
        // 处理用户输入
        function handleInput(input) {
            if (!input.trim()) return;
            
            // 记录命令历史
            addToHistory(input);
            
            // 清除输入框
            inputElement.value = '';
            
            // 处理特殊命令
            if (input.toLowerCase() === 'help') {
                showHelp();
                return;
            }
            
            if (input.toLowerCase() === 'inventory') {
                showInventory();
                return;
            }
            
            if (input.toLowerCase() === 'status') {
                showStatus();
                return;
            }
            
            // 处理场景选择
            const currentScene = storyData[gameState.currentScene];
            if (currentScene && currentScene.nextScenes && currentScene.nextScenes[input]) {
                const nextScene = currentScene.nextScenes[input];
                showScene(nextScene);
                
                // 根据选择更新状态
                updateStateBasedOnChoice(input, nextScene);
            } else {
                showErrorMessage("无效的选择，请输入选项前的数字或输入 'help' 查看指令");
            }
        }
        
        // 根据选择更新状态
        function updateStateBasedOnChoice(choice, nextScene) {
            // 例子：战斗会减少体力
            if (nextScene === 'fightDog') {
                gameState.health = Math.max(0, gameState.health - 30);
            }
            
            // 例子：休息会增加体力
            if (nextScene === 'restMore') {
                gameState.health = Math.min(100, gameState.health + 20);
            }
            
            updateStatusIndicators();
        }
        
        // 更新状态指示器
        function updateStatusIndicators() {
            healthIndicator.textContent = `体力: ${gameState.health}%`;
        }
        
        // 添加到命令历史
        function addToHistory(command) {
            const historyEntry = document.createElement('div');
            historyEntry.className = 'history-entry';
            historyEntry.innerHTML = `<span class="prompt">$</span> ${command}`;
            commandHistory.appendChild(historyEntry);
            commandHistory.scrollTop = commandHistory.scrollHeight;
        }
        
        // 显示帮助信息
        function showHelp() {
            const helpText = `
                <p class="story-paragraph">可用指令:</p>
                <p class="story-paragraph">1-9 - 选择剧情选项</p>
                <p class="story-paragraph">help - 显示帮助信息</p>
                <p class="story-paragraph">inventory - 查看物品栏</p>
                <p class="story-paragraph">status - 查看当前状态</p>
                <p class="story-paragraph">restart - 重新开始游戏</p>
            `;
            
            contentArea.innerHTML = helpText;
        }
        
        // 显示物品栏
        function showInventory() {
            let inventoryText = '<p class="story-paragraph">物品栏:</p>';
            
            if (gameState.inventory.length === 0) {
                inventoryText += '<p class="story-paragraph">你没有任何物品</p>';
            } else {
                gameState.inventory.forEach(item => {
                    inventoryText += `<p class="story-paragraph">- ${item}</p>`;
                });
            }
            
            contentArea.innerHTML = inventoryText;
        }
        
        // 显示状态信息
        function showStatus() {
            const statusText = `
                <p class="story-paragraph">生存状态:</p>
                <p class="story-paragraph">体力: ${gameState.health}%</p>
                <p class="story-paragraph">物资: ${gameState.supplies}</p>
                <p class="story-paragraph">已生存: ${gameState.daysSurvived} 天</p>
            `;
            
            contentArea.innerHTML = statusText;
        }
        
        // 显示错误信息
        function showErrorMessage(message) {
            const errorElement = document.createElement('p');
            errorElement.className = 'story-paragraph';
            errorElement.textContent = `错误: ${message}`;
            contentArea.appendChild(errorElement);
            contentArea.scrollTop = contentArea.scrollHeight;
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            // 处理输入提交
            inputElement.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    handleInput(inputElement.value);
                }
            });
            
            // 更新光标位置
            function updateCursor() {
                const inputRect = inputElement.getBoundingClientRect();
                const wrapperRect = inputElement.parentElement.getBoundingClientRect();
                cursorElement.style.left = `${inputRect.width + 4}px`; // 4px是额外间距
            }
            
            inputElement.addEventListener('input', updateCursor);
            window.addEventListener('resize', updateCursor);
            
            // 初始化光标位置
            updateCursor();
            
            // 自动聚焦输入框
            inputElement.focus();
        }
        
        // 启动游戏
        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
